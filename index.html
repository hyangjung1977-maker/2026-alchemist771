<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>나의 메모장 (클라우드 동기화)</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --bg:#f5f7fb; --surface:#ffffff; --surface2:#f2f4f8; --panel:#ffffff;
  --border:#e4e8f0; --border2:#d6dbe6;
  --text:#1a1f2b; --text2:#5b6577; --text3:#8a94a6;
  --accent:#d4941e; --accent2:#f0b340; --accent-bg:rgba(212,148,30,0.12);
  --red:#c0443a; --red-bg:rgba(192,68,58,0.12);
  --green:#2f8f5b; --green-bg:rgba(47,143,91,0.12);
  --radius:14px; --shadow:0 8px 26px rgba(20,35,60,0.12);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;}
@media print{
  body{background:#fff !important;}
  .app{display:block !important;height:auto !important;}
  .cal-panel{display:none !important;}
  .memo-panel{transform:none !important;}
  .close-btn,.print-btn,.theme-btn{display:none !important;}
  .task-del,.task-star,.task-check{display:none !important;}
  .task-item{border:1px solid #ddd !important;}
  .toast,.modal,.modal-backdrop{display:none !important;}
}
.app{display:flex;height:100vh;overflow:hidden;}
.cal-panel{
  width:420px;min-width:340px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--surface);border-right:1px solid var(--border);
  padding:32px 28px 24px;overflow-y:auto;
}
.app-title{
  font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--accent2);
  letter-spacing:0.01em;margin-bottom:18px;display:flex;align-items:baseline;gap:10px;justify-content:space-between;
}
.title-left{display:flex;align-items:baseline;gap:10px;}
.app-title span{
  font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;font-weight:500;color:var(--text3);
  letter-spacing:0.1em;text-transform:uppercase;
}
.auth-chip{
  display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);
  border-radius:999px;padding:6px 10px;box-shadow:var(--shadow);max-width:260px;
}
.theme-btn{
  width:28px;height:28px;border:1px solid var(--border2);background:transparent;border-radius:10px;
  cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent);}
.auth-chip .who{
  font-size:0.72rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;
}
.auth-chip button#btn-auth{
  border:1px solid var(--border2);background:transparent;color:var(--text2);border-radius:10px;
  padding:4px 10px;cursor:pointer;font-size:0.72rem;transition:all .15s;
}
.auth-chip button#btn-auth:hover{border-color:var(--accent);color:var(--accent);}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.month-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-style:italic;color:var(--text);}
.month-btn{
  width:32px;height:32px;border:1px solid var(--border2);background:transparent;border-radius:8px;
  color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.month-btn:hover{border-color:var(--accent);color:var(--accent);}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.cal-head-cell{
  text-align:center;font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text3);padding:6px 0;
}
.cal-head-cell:first-child{color:#c06060;}
.cal-head-cell:last-child{color:#6080c0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{
  aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;border:1.5px solid transparent;gap:2px;
}
.cal-cell:hover{background:var(--accent-bg);border-color:var(--accent);}
.cal-cell.empty{cursor:default;pointer-events:none;}
.cal-cell.other-month .cal-num{color:var(--text3);}
.cal-cell.today{border-color:var(--accent);}
.cal-cell.today .cal-num{color:var(--accent2);font-weight:900;}
.cal-cell.selected{background:var(--accent);border-color:var(--accent);}
.cal-cell.selected .cal-num{color:#fff;font-weight:900;}
.cal-cell.selected .cal-dot{background:#fff;}
.cal-cell.sun .cal-num{color:#c07070;}
.cal-cell.sat .cal-num{color:#7090c0;}
.cal-num{font-size:0.82rem;font-weight:700;color:var(--text);line-height:1;}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);}
.cal-legend{
  margin-top:24px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--text2);}
.legend-dot{width:8px;height:8px;border-radius:2px;}

.memo-panel{
  flex:1;display:flex;flex-direction:column;background:var(--panel);
  transform:translateX(100%);transition:transform .35s cubic-bezier(0.25,0.8,0.25,1);overflow:hidden;
}
.memo-panel.open{transform:translateX(0);}
.memo-header{
  padding:28px 32px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:16px;flex-shrink:0;
}
.memo-date-block{
  background:var(--accent);color:#fff;border-radius:12px;width:52px;height:56px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;
}
.memo-date-day{font-size:0.6rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;}
.memo-date-num{font-size:1.5rem;font-weight:900;line-height:1;}
.memo-date-info{flex:1;}
.memo-date-full{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text);}
.memo-date-stats{margin-top:4px;font-size:0.72rem;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;}
.stat-badge{display:inline-flex;align-items:center;gap:4px;}
.header-actions{display:flex;gap:8px;align-items:center;}
.print-btn,.close-btn{
  width:40px;height:40px;border:1.5px solid var(--border2);background:transparent;border-radius:10px;color:var(--text2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-size:1rem;
}
.print-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.close-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}

/* ── 일정 미루기 버튼 (헤더용) ── */
.reschedule-btn{
  display:flex;align-items:center;gap:6px;
  height:40px;padding:0 16px;
  border:1.5px solid var(--border2);background:transparent;border-radius:10px;
  color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0;
  font-size:0.82rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;
}
.reschedule-btn:hover{
  border-color:var(--accent);color:var(--accent);
  background:var(--accent-bg);transform:translateY(-1px);
}

.add-form{
  padding:18px 32px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:10px;
}
.form-row{display:flex;gap:8px;align-items:center;}
.time-input,.task-input{
  border:1.5px solid var(--border2);background:var(--surface2);border-radius:8px;padding:8px 10px;
  font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;
}
.time-input{font-size:.85rem;color:var(--text);width:90px;}
.task-input{flex:1;font-size:.88rem;color:var(--text);padding:8px 12px;}
.time-input:focus,.task-input:focus{border-color:var(--accent);}
.task-input::placeholder,.time-input::placeholder{color:var(--text3);}
.flag-row{display:flex;gap:8px;align-items:center;}
.flag-btn{
  border:1.5px solid var(--border2);background:transparent;border-radius:8px;padding:6px 14px;font-size:.76rem;
  color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;
}
.flag-btn.important-flag.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.flag-btn:not(.active):hover{border-color:var(--border2);color:var(--text);}
.add-task-btn{
  margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 20px;
  font-size:.82rem;font-weight:900;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.add-task-btn:hover{filter:brightness(1.05);transform:translateY(-1px);}
.add-task-btn:active{transform:translateY(0);}

.task-list{flex:1;overflow-y:auto;padding:16px 32px 32px;display:flex;flex-direction:column;}
.task-list::-webkit-scrollbar{width:4px;}
.task-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.time-group{margin-bottom:4px;}
.time-group-label{
  font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);
  padding:10px 0 4px;display:flex;align-items:center;gap:8px;
}
.time-group-label::after{content:'';flex:1;height:1px;background:var(--border);}
.task-item{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;border:1.5px solid transparent;
  transition:all .15s;position:relative;margin-bottom:2px;animation:fadeUp .22s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.task-item:hover{background:var(--surface2);border-color:var(--border);}
.task-item.done{opacity:.6;}
.task-item.important:not(.done){background:var(--accent-bg);border-color:rgba(0,0,0,0.06);}
.task-check{
  width:20px;height:20px;border:2px solid var(--border2);border-radius:6px;flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;user-select:none;
}
.task-check:hover{border-color:var(--green);}
.task-item.done .task-check{background:var(--green);border-color:var(--green);color:#fff;}
.task-star{
  width:20px;height:20px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;color:var(--text3);transition:all .15s;margin-top:1px;user-select:none;
}
.task-star:hover{color:var(--accent);}
.task-item.important .task-star{color:var(--accent);}
.task-body{flex:1;min-width:0;}
.task-time-tag{font-size:.68rem;color:var(--text3);margin-bottom:2px;}
.task-text{font-size:.9rem;color:var(--text);line-height:1.5;word-break:break-word;}
.task-item.done .task-text{text-decoration:line-through;color:var(--text3);}
.task-del{
  width:22px;height:22px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:5px;
  font-size:.85rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;
}
.task-item:hover .task-del{opacity:1;}
.task-del:hover{color:var(--red);background:var(--red-bg);}
.empty-tasks{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:40px 0;color:var(--text3);
}
.empty-tasks .icon{font-size:2.2rem;opacity:.55;}
.empty-tasks p{font-size:.85rem;}
.no-date{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);
  padding:40px;text-align:center;
}
.no-date .icon{font-size:3rem;opacity:.35;}
.no-date h2{font-family:'Playfair Display',serif;font-style:italic;font-size:1.4rem;color:var(--text2);}
.no-date p{font-size:.85rem;line-height:1.8;}
.notes-area{padding:0 32px 16px;border-top:1px solid var(--border);padding-top:14px;}
.notes-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-weight:800;}
.notes-input{
  width:100%;border:1.5px solid var(--border);background:var(--surface2);border-radius:10px;padding:10px 12px;
  font-size:.84rem;color:var(--text);resize:none;outline:none;line-height:1.7;min-height:70px;
}
.notes-input:focus{border-color:var(--accent);}
.notes-input::placeholder{color:var(--text3);}
.save-indicator{padding:8px 32px;font-size:.72rem;color:var(--text3);font-style:italic;height:30px;}

.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.92);border:1px solid var(--border);color:var(--text2);
  padding:10px 14px;border-radius:999px;display:none;gap:10px;align-items:center;z-index:9999;
  box-shadow:var(--shadow);backdrop-filter:blur(10px);
}
.toast.show{display:flex;}
.toast .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.toast .msg{font-size:.82rem;}
.toast .ok{
  border:1px solid var(--border2);background:transparent;color:var(--text2);border-radius:999px;
  padding:4px 10px;cursor:pointer;font-size:.75rem;
}
.toast .ok:hover{border-color:var(--accent);color:var(--accent);}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;z-index:9998;}
.modal-backdrop.show{display:block;}
.modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(520px,calc(100vw - 32px));background:var(--surface);border:1px solid var(--border);
  border-radius:16px;box-shadow:0 18px 60px rgba(0,0,0,0.25);padding:18px 18px 14px;display:none;z-index:9999;
}
.modal.show{display:block;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.modal-title{font-weight:900;color:var(--text);}
.modal-close{
  width:32px;height:32px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;
}
.modal-close:hover{border-color:var(--red);color:var(--red);}
.preset-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.preset{border:1px solid var(--border2);border-radius:12px;padding:10px;cursor:pointer;background:var(--surface2);min-width:120px;flex:1;}
.preset .name{font-size:.8rem;font-weight:900;margin-bottom:8px;}
.preset .chips{display:flex;gap:6px;}
.chip{width:16px;height:16px;border-radius:6px;border:1px solid rgba(0,0,0,0.08);}
.ctrls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.ctrl{border:1px solid var(--border);background:var(--surface2);border-radius:12px;padding:10px;}
.ctrl label{display:block;font-size:.72rem;color:var(--text2);margin-bottom:6px;font-weight:800;}
.ctrl input[type="color"]{width:100%;height:38px;border:none;background:transparent;padding:0;cursor:pointer;}
.ctrl input[type="range"]{width:100%;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border);}
.btn{
  border:1px solid var(--border2);background:transparent;color:var(--text2);border-radius:10px;padding:8px 12px;
  cursor:pointer;font-weight:900;font-size:.82rem;
}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary:hover{filter:brightness(1.05);color:#fff;}

/* ══════════════════════════════════════
   일정 미루기 모달 — 데모 스타일 통합
══════════════════════════════════════ */
#rs-backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(5px);
  display:none;z-index:10000;
}
#rs-backdrop.show{display:block;}

#rs-modal{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(480px,calc(100vw - 20px));
  max-height:88vh;
  background:var(--surface);
  border-radius:22px;
  box-shadow:0 28px 70px rgba(0,0,0,0.30);
  display:none;flex-direction:column;
  z-index:10001;overflow:hidden;
}
#rs-modal.show{display:flex;animation:rsSlideUp .30s cubic-bezier(.25,.8,.25,1);}
@keyframes rsSlideUp{
  from{opacity:0;transform:translate(-50%,-44%);}
  to  {opacity:1;transform:translate(-50%,-50%);}
}

/* ── 헤더 (그라디언트, 데모 스타일) ── */
.rs-header{
  padding:22px 24px 18px;
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  display:flex;align-items:center;gap:14px;flex-shrink:0;
}
.rs-header-icon{font-size:1.8rem;line-height:1;}
.rs-header-text{flex:1;}
.rs-header-title{font-size:1.05rem;font-weight:900;color:#fff;letter-spacing:-.01em;}
.rs-header-sub{font-size:.75rem;color:rgba(255,255,255,0.80);margin-top:3px;}
.rs-header-close{
  width:32px;height:32px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.22);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;
  transition:background .15s;
}
.rs-header-close:hover{background:rgba(255,255,255,0.38);}

/* ── 스텝 바 (데모와 동일한 28px 원형) ── */
.rs-steps{
  display:flex;align-items:center;justify-content:center;
  padding:16px 24px;background:var(--surface2);
  border-bottom:1px solid var(--border);gap:0;flex-shrink:0;
}
.rs-step{display:flex;align-items:center;gap:7px;}
.rs-step-dot{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:900;transition:all .3s;
  background:var(--border2);color:var(--text3);
}
.rs-step-dot.active{background:var(--accent);color:#fff;box-shadow:0 0 0 3px var(--accent-bg);}
.rs-step-dot.done{background:var(--green);color:#fff;}
.rs-step-label{font-size:.74rem;font-weight:600;color:var(--text3);}
.rs-step-label.active{color:var(--accent);font-weight:700;}
.rs-step-line{width:32px;height:2px;background:var(--border2);margin:0 5px;}

/* ── 본문 ── */
.rs-body{flex:1;overflow-y:auto;padding:20px 24px;}
.rs-body::-webkit-scrollbar{width:4px;}
.rs-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.rs-panel{display:none;}
.rs-panel.active{display:block;}

/* ── 필터 행 ── */
.rs-filter-row{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.rs-filter-label{font-size:.74rem;color:var(--text3);}
.rs-fbtn{
  border:1.5px solid var(--border2);background:transparent;border-radius:999px;
  padding:4px 13px;font-size:.74rem;cursor:pointer;color:var(--text2);
  font-family:'Noto Sans KR',sans-serif;transition:all .15s;
}
.rs-fbtn.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:700;}
.rs-sel-btn{
  border:1px solid var(--border2);background:var(--surface2);border-radius:8px;
  padding:4px 11px;font-size:.72rem;cursor:pointer;color:var(--text2);
  font-family:'Noto Sans KR',sans-serif;transition:all .15s;
}
.rs-sel-btn:hover{border-color:var(--accent);color:var(--accent);}
.rs-spacer{flex:1;}

/* ── 할일 목록 (데모 스타일 — 넉넉한 패딩, 큰 체크박스) ── */
.rs-todo-list{display:flex;flex-direction:column;gap:9px;}
.rs-todo-item{
  display:flex;align-items:center;gap:13px;
  padding:13px 15px;border-radius:13px;
  border:1.5px solid var(--border);cursor:pointer;
  transition:all .15s;background:var(--surface);user-select:none;
}
.rs-todo-item:hover{border-color:var(--accent);background:var(--accent-bg);transform:translateY(-1px);}
.rs-todo-item.sel{border-color:var(--accent);background:var(--accent-bg);}

/* 체크박스 — 데모의 20px 스타일 */
.rs-cb{
  width:20px;height:20px;border-radius:6px;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:900;flex-shrink:0;
  transition:all .15s;color:transparent;
}
.rs-todo-item.sel .rs-cb{
  background:var(--accent);border-color:var(--accent);color:#fff;
}
.rs-todo-txt{
  flex:1;font-size:.88rem;color:var(--text);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}

<script type="module">
  // =========================
  // Firebase 설정
  // =========================
  const firebaseConfig = {
    apiKey: "AIzaSyC7WioYdpqU7Fmnkxf2IOPzLTtukgG0HPs",
    authDomain: "carbide-algebra-423504-r3.firebaseapp.com",
    projectId: "carbide-algebra-423504-r3",
    storageBucket: "carbide-algebra-423504-r3.firebasestorage.app",
    messagingSenderId: "753873202243",
    appId: "1:753873202243:web:20b920fe0e0d3f6be3b8f6",
    measurementId: "G-EBS38GS8DZ"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider,
    signInWithPopup, signInWithRedirect, getRedirectResult,
    signOut, onAuthStateChanged,
    setPersistence, browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  await setPersistence(auth, browserLocalPersistence);

  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });

  // ===== Toast =====
  window.hideToast = () => document.getElementById("toast").classList.remove("show");
  function toast(msg){
    const t = document.getElementById("toast");
    document.getElementById("toast-msg").textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2600);
  }

  // ===== Utils (theme) =====
  function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }
  function hexToRgb(hex){
    const h = (hex||"").replace("#","").trim();
    if (h.length===3) return { r:parseInt(h[0]+h[0],16), g:parseInt(h[1]+h[1],16), b:parseInt(h[2]+h[2],16) };
    if (h.length===6) return { r:parseInt(h.slice(0,2),16), g:parseInt(h.slice(2,4),16), b:parseInt(h.slice(4,6),16) };
    return {r:0,g:0,b:0};
  }
  function hexToRgba(hex, a){ const {r,g,b} = hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }
  function rgbToHex(r,g,b){ const to=(v)=>clamp(Math.round(v),0,255).toString(16).padStart(2,"0"); return `#${to(r)}${to(g)}${to(b)}`; }
  function mix(c1,c2,t){ const a=hexToRgb(c1),b=hexToRgb(c2); return rgbToHex(a.r+(b.r-a.r)*t,a.g+(b.g-a.g)*t,a.b+(b.b-a.b)*t); }
  function luma(hex){ const {r,g,b}=hexToRgb(hex); return Math.round((0.2126*r+0.7152*g+0.0722*b)/255*100); }
  function applyTheme(t){
    const accent=t.accent||"#d4941e", bg=t.bg||"#f5f7fb", surface=t.surface||"#ffffff", text=t.text||"#1a1f2b";
    document.documentElement.style.setProperty("--accent",accent);
    document.documentElement.style.setProperty("--accent2",accent);
    document.documentElement.style.setProperty("--accent-bg",hexToRgba(accent,0.12));
    document.documentElement.style.setProperty("--bg",bg);
    document.documentElement.style.setProperty("--surface",surface);
    document.documentElement.style.setProperty("--panel",surface);
    document.documentElement.style.setProperty("--surface2",mix(surface,"#e9edf5",0.55));
    document.documentElement.style.setProperty("--text",text);
    document.documentElement.style.setProperty("--text2",mix(text,"#8892a3",0.55));
    document.documentElement.style.setProperty("--text3",mix(text,"#a7b0c2",0.72));
    document.documentElement.style.setProperty("--border",mix(bg,"#cfd6e4",0.45));
    document.documentElement.style.setProperty("--border2",mix(bg,"#bfc8da",0.45));
  }

  // ===== Theme storage =====
  const THEME_KEY_LOCAL = "memopad_theme_v2";
  const presets = [
    { name:"밝은(기본)", accent:"#d4941e", bg:"#f5f7fb", surface:"#ffffff", text:"#1a1f2b" },
    { name:"스카이",     accent:"#3b82f6", bg:"#f2f7ff", surface:"#ffffff", text:"#162033" },
    { name:"민트",       accent:"#10b981", bg:"#f2fbf7", surface:"#ffffff", text:"#14251f" },
    { name:"로즈",       accent:"#e11d48", bg:"#fff1f5", surface:"#ffffff", text:"#2b1520" },
    { name:"라벤더",     accent:"#8b5cf6", bg:"#f7f3ff", surface:"#ffffff", text:"#1f1833" },
    { name:"다크",       accent:"#f0b340", bg:"#0f0e0c", surface:"#1a1916", text:"#e8e2d9" },
  ];
  function loadThemeLocal(){ try{ const r=localStorage.getItem(THEME_KEY_LOCAL); return r?JSON.parse(r):null; }catch{ return null; } }
  function saveThemeLocal(theme){ localStorage.setItem(THEME_KEY_LOCAL,JSON.stringify(theme)); }
  function userThemeRef(uid){ return doc(db,"users",uid,"settings","theme"); }
  async function loadThemeCloud(uid){ const snap=await getDoc(userThemeRef(uid)); if(!snap.exists())return null; return snap.data()?.theme||null; }
  async function saveThemeCloud(uid,theme){ await setDoc(userThemeRef(uid),{theme,updatedAtServer:serverTimestamp(),updatedAt:Date.now()},{merge:true}); }

  window.openTheme = () => {
    renderPresets();
    const cur=loadThemeLocal()||presets[0];
    document.getElementById("pick-accent").value=cur.accent||"#d4941e";
    document.getElementById("pick-text").value=cur.text||"#1a1f2b";
    document.getElementById("pick-surface").value=cur.surface||"#ffffff";
    document.getElementById("pick-bright").value=luma(cur.bg||"#f5f7fb");
    document.getElementById("theme-backdrop").classList.add("show");
    document.getElementById("theme-modal").classList.add("show");
  };
  window.closeTheme = () => {
    document.getElementById("theme-backdrop").classList.remove("show");
    document.getElementById("theme-modal").classList.remove("show");
  };
  function renderPresets(){
    const wrap=document.getElementById("preset-row"); wrap.innerHTML="";
    presets.forEach(p=>{
      const el=document.createElement("div"); el.className="preset";
      el.innerHTML=`<div class="name">${p.name}</div><div class="chips"><div class="chip" style="background:${p.bg}"></div><div class="chip" style="background:${p.surface}"></div><div class="chip" style="background:${p.accent}"></div><div class="chip" style="background:${p.text}"></div></div>`;
      el.onclick=()=>{
        const theme={...p}; saveThemeLocal(theme); applyTheme(theme);
        document.getElementById("pick-accent").value=theme.accent;
        document.getElementById("pick-text").value=theme.text;
        document.getElementById("pick-surface").value=theme.surface;
        document.getElementById("pick-bright").value=luma(theme.bg);
      };
      wrap.appendChild(el);
    });
  }
  function liveApplyFromPickers(){
    const accent=document.getElementById("pick-accent").value;
    const text=document.getElementById("pick-text").value;
    const surface=document.getElementById("pick-surface").value;
    const bright=parseInt(document.getElementById("pick-bright").value||"70",10);
    const base=mix("#0b0f1a","#ffffff",bright/100);
    const bg=mix(base,surface,0.12);
    const theme={accent,text,surface,bg};
    applyTheme(theme); return theme;
  }
  document.getElementById("pick-accent").addEventListener("input",liveApplyFromPickers);
  document.getElementById("pick-text").addEventListener("input",liveApplyFromPickers);
  document.getElementById("pick-surface").addEventListener("input",liveApplyFromPickers);
  document.getElementById("pick-bright").addEventListener("input",liveApplyFromPickers);
  window.resetTheme=()=>{ const theme=presets[0]; saveThemeLocal(theme); applyTheme(theme); toast("테마를 초기화했어요"); };
  window.saveTheme=async(toCloud)=>{
    const theme=liveApplyFromPickers(); saveThemeLocal(theme);
    if(toCloud&&currentUser){ try{ await saveThemeCloud(currentUser.uid,theme); toast("테마를 계정에 저장했어요"); }catch(e){ toast("저장 실패:"+(e?.code||e?.message)); } }
    else toast("테마를 저장했어요");
    closeTheme();
  };

  // ===== Auth =====
  let currentUser = null;
  function refreshAuthUI(){
    const who=document.getElementById("who"); const btn=document.getElementById("btn-auth");
    if(currentUser){ who.textContent=currentUser.displayName||currentUser.email||"로그인됨"; btn.textContent="로그아웃"; }
    else{ who.textContent="로그인 필요"; btn.textContent="로그인"; }
  }
  window.handleAuth=async()=>{
    if(currentUser){
      try{ await signOut(auth); toast("로그아웃 완료!"); }catch(e){ toast("로그아웃 실패:"+(e?.code||e?.message||e)); }
      return;
    }
    try{
      toast("Google 로그인 창 여는 중…"); await signInWithPopup(auth,provider);
    }catch(e){
      if(e?.code==="auth/popup-blocked"||e?.code==="auth/popup-closed-by-user"){
        toast("팝업이 차단됐어요. 리디렉션으로 재시도합니다…");
        try{ await signInWithRedirect(auth,provider); }catch(e2){ toast("로그인 실패:"+(e2?.code||e2?.message||e2)); }
      }else{ toast("로그인 실패:"+(e?.code||e?.message||e)); }
    }
  };
  try{ const result=await getRedirectResult(auth); if(result?.user) toast("로그인 완료!"); }catch(e){ if(e?.code) toast("로그인 처리 실패:"+e.code); }

  // ===== Planner core =====
  const DAYS_KO=['일','월','화','수','목','금','토'];
  const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const PREFIX='memopad2_';

  const today=new Date(); today.setHours(0,0,0,0);
  let calYear=today.getFullYear(); let calMonth=today.getMonth();
  let selKey=null; let tasks=[]; let flagImportant=false; let saveTimer; let isDirty=false;

  function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function todayKey(){ return dateKey(today.getFullYear(),today.getMonth(),today.getDate()); }
  function localKey(key){ return PREFIX+key; }
  function dayDocRef(uid,key){ return doc(db,"users",uid,"days",key); }

  function loadLocalDay(key){
    const raw=localStorage.getItem(localKey(key));
    if(!raw) return {tasks:[],notes:'',updatedAt:0};
    try{ return JSON.parse(raw); }catch{ return {tasks:[],notes:'',updatedAt:0}; }
  }
  function saveLocalDay(key,data){
    const payload={tasks:data.tasks??[],notes:data.notes??'',updatedAt:data.updatedAt??Date.now()};
    const isEmpty=payload.tasks.length===0&&!(payload.notes||"").trim();
    if(isEmpty) localStorage.removeItem(localKey(key));
    else localStorage.setItem(localKey(key),JSON.stringify(payload));
  }
  async function loadCloudDay(uid,key){
    const snap=await getDoc(dayDocRef(uid,key));
    if(!snap.exists()) return {tasks:[],notes:'',updatedAt:0};
    const data=snap.data()||{};
    return { tasks:Array.isArray(data.tasks)?data.tasks:[], notes:typeof data.notes==="string"?data.notes:"", updatedAt:typeof data.updatedAt==="number"?data.updatedAt:0 };
  }
  async function saveCloudDay(uid,key,data){
    await setDoc(dayDocRef(uid,key),{tasks:data.tasks??[],notes:data.notes??"",updatedAt:data.updatedAt??Date.now(),updatedAtServer:serverTimestamp()},{merge:true});
  }
  function mergeDay(local,cloud){
    const l=local||{tasks:[],notes:'',updatedAt:0}; const c=cloud||{tasks:[],notes:'',updatedAt:0};
    return (c.updatedAt>l.updatedAt)?c:l;
  }
  function hasSavedData(key){ return !!localStorage.getItem(localKey(key)); }

  function renderCalendar(){
    document.getElementById("month-title").textContent=`${calYear}년 ${MONTHS[calMonth]}`;
    const grid=document.getElementById("cal-grid"); grid.innerHTML="";
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const lastDate=new Date(calYear,calMonth+1,0).getDate();
    const prevLast=new Date(calYear,calMonth,0).getDate();
    for(let i=0;i<firstDay;i++) grid.appendChild(makeCell(calYear,calMonth-1,prevLast-firstDay+1+i,true));
    for(let d=1;d<=lastDate;d++) grid.appendChild(makeCell(calYear,calMonth,d,false));
    const total=firstDay+lastDate; const remain=total%7===0?0:7-(total%7);
    for(let i=1;i<=remain;i++) grid.appendChild(makeCell(calYear,calMonth+1,i,true));
  }
  function makeCell(y,m,d,otherMonth){
    const real=new Date(y,m,d); const ry=real.getFullYear(); const rm=real.getMonth(); const rd=real.getDate();
    const key=dateKey(ry,rm,rd); const dow=real.getDay();
    const cell=document.createElement("div");
    cell.className="cal-cell"+(otherMonth?" other-month":"")+(dow===0?" sun":dow===6?" sat":"");
    if(!otherMonth){ if(key===todayKey())cell.classList.add("today"); if(key===selKey)cell.classList.add("selected"); }
    const num=document.createElement("div"); num.className="cal-num"; num.textContent=rd; cell.appendChild(num);
    if(hasSavedData(key)&&key!==selKey){ const dot=document.createElement("div"); dot.className="cal-dot"; cell.appendChild(dot); }
    cell.onclick=()=>selectDate(ry,rm,rd); return cell;
  }
  window.changeMonth=(delta)=>{
    calMonth+=delta; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;}
    renderCalendar();
  };
  async function selectDate(y,m,d){
    await commitSave(); selKey=dateKey(y,m,d); renderCalendar(); await openPanel(y,m,d);
  }
  async function openPanel(y,m,d){
    const panel=document.getElementById("memo-panel"); const content=document.getElementById("memo-content");
    const noDate=document.getElementById("no-date-msg");
    panel.classList.add("open"); noDate.style.display="none"; content.style.display="flex";
    const dt=new Date(y,m,d);
    document.getElementById("hdr-day").textContent=DAYS_KO[dt.getDay()]+"요일";
    document.getElementById("hdr-num").textContent=d;
    document.getElementById("hdr-full").textContent=`${y}년 ${m+1}월 ${d}일`;
    const local=loadLocalDay(selKey);
    tasks=local.tasks||[]; document.getElementById("notes-input").value=local.notes||"";
    isDirty=false; renderTasks(); updateStats();
    if(currentUser){
      showSaveInd("동기화 중…");
      try{
        const cloud=await loadCloudDay(currentUser.uid,selKey);
        const merged=mergeDay(local,cloud);
        tasks=merged.tasks||[]; document.getElementById("notes-input").value=merged.notes||"";
        isDirty=false; saveLocalDay(selKey,merged); renderTasks(); updateStats(); renderCalendar();
        showSaveInd("동기화됨");
      }catch(e){ console.error(e); showSaveInd("오프라인/동기화 실패(로컬 저장됨)"); }
    }
    const now=new Date();
    document.getElementById("inp-time").value=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    document.getElementById("inp-task").value="";
    flagImportant=false; updateFlagBtn(); document.getElementById("inp-task").focus();
  }
  window.closePanel=async()=>{
    await commitSave(); selKey=null;
    document.getElementById("memo-panel").classList.remove("open");
    document.getElementById("memo-content").style.display="none";
    document.getElementById("no-date-msg").style.display="flex";
    renderCalendar();
  };
  function escHtml(s){ return (s??"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
  function renderTasks(){
    const list=document.getElementById("task-list"); list.innerHTML="";
    if(tasks.length===0){ list.innerHTML=`<div class="empty-tasks"><div class="icon">✍️</div><p>아직 할 일이 없습니다.<br>위에서 추가해보세요!</p></div>`; return; }
    const sorted=[...tasks].sort((a,b)=>{ if(!a.time&&!b.time)return 0; if(!a.time)return 1; if(!b.time)return -1; return a.time.localeCompare(b.time); });
    const groups={};
    sorted.forEach(t=>{ const g=t.time||"시간 미정"; (groups[g]||=[]).push(t); });
    Object.entries(groups).forEach(([grpTime,grpTasks])=>{
      const grpEl=document.createElement("div"); grpEl.className="time-group";
      const lbl=document.createElement("div"); lbl.className="time-group-label"; lbl.textContent=grpTime; grpEl.appendChild(lbl);
      grpTasks.forEach(t=>grpEl.appendChild(makeTaskEl(t))); list.appendChild(grpEl);
    });
  }
  function makeTaskEl(t){
    const el=document.createElement("div");
    el.className="task-item"+(t.done?" done":"")+(t.important?" important":"");
    el.innerHTML=`
      <div class="task-check" data-action="toggleDone" data-id="${t.id}">${t.done?"✓":""}</div>
      <div class="task-body">${t.time?`<div class="task-time-tag">${t.time}</div>`:""}<div class="task-text">${escHtml(t.text)}</div></div>
      <div class="task-star" data-action="toggleImportant" data-id="${t.id}" title="중요 표시">${t.important?"⭐":"☆"}</div>
      <button class="task-del" data-action="deleteTask" data-id="${t.id}" title="삭제">✕</button>`;
    return el;
  }
  document.getElementById("task-list").addEventListener("click",(e)=>{
    const t=e.target.closest("[data-action]"); if(!t)return;
    const action=t.getAttribute("data-action"); const id=t.getAttribute("data-id"); if(!id)return;
    if(action==="toggleDone") toggleDone(id);
    if(action==="toggleImportant") toggleImportant(id);
    if(action==="deleteTask") deleteTask(id);
  });
  window.addTask=()=>{
    const text=document.getElementById("inp-task").value.trim();
    if(!text){ document.getElementById("inp-task").focus(); return; }
    const time=document.getElementById("inp-time").value;
    tasks.push({id:Date.now().toString(),text,time,done:false,important:flagImportant});
    document.getElementById("inp-task").value=""; flagImportant=false; updateFlagBtn();
    renderTasks(); updateStats(); autoSave();
  };
  function toggleDone(id){ const t=tasks.find(x=>x.id===id); if(t){t.done=!t.done;renderTasks();updateStats();autoSave();} }
  function toggleImportant(id){ const t=tasks.find(x=>x.id===id); if(t){t.important=!t.important;renderTasks();updateStats();autoSave();} }
  function deleteTask(id){ tasks=tasks.filter(x=>x.id!==id); renderTasks();updateStats();autoSave(); }
  window.toggleFlag=(type)=>{ if(type==="important"){flagImportant=!flagImportant;updateFlagBtn();} };
  function updateFlagBtn(){ document.getElementById("flag-important").classList.toggle("active",flagImportant); }
  function updateStats(){
    const total=tasks.length; const done=tasks.filter(t=>t.done).length; const imp=tasks.filter(t=>t.important&&!t.done).length;
    const el=document.getElementById("hdr-stats");
    el.innerHTML=total>0?`<span class="stat-badge">✅ ${done}/${total} 완료</span>`+(imp>0?`<span class="stat-badge">⭐ 중요 ${imp}건</span>`:""):`<span>할 일을 추가해보세요</span>`;
  }
  function showSaveInd(msg){ const el=document.getElementById("save-ind"); el.textContent=msg; setTimeout(()=>{el.textContent="";},2000); }
  function autoSave(){
    isDirty=true; clearTimeout(saveTimer);
    saveTimer=setTimeout(async()=>{
      if(!selKey)return;
      const notes=document.getElementById("notes-input").value;
      const data={tasks,notes,updatedAt:Date.now()};
      saveLocalDay(selKey,data); isDirty=false; renderCalendar();
      if(currentUser){
        try{ showSaveInd("동기화 중…"); await saveCloudDay(currentUser.uid,selKey,data); showSaveInd("저장됨(동기화)"); }
        catch(e){ console.error(e); showSaveInd("오프라인(로컬 저장됨)"); }
      }else{ showSaveInd("저장됨(로컬)"); }
    },650);
  }
  async function commitSave(){
    if(isDirty&&selKey){
      clearTimeout(saveTimer);
      const notes=document.getElementById("notes-input").value;
      const data={tasks,notes,updatedAt:Date.now()};
      saveLocalDay(selKey,data); isDirty=false;
      if(currentUser){ try{await saveCloudDay(currentUser.uid,selKey,data);}catch(e){console.error(e);} }
    }
  }
  document.getElementById("inp-task").addEventListener("keydown",(e)=>{ if(e.key==="Enter")window.addTask(); });
  document.getElementById("notes-input").addEventListener("input",autoSave);
  window.printDay=async()=>{
    if(!selKey)return; await commitSave();
    tasks=[...tasks].sort((a,b)=>{ if(!a.time&&!b.time)return 0; if(!a.time)return 1; if(!b.time)return -1; return a.time.localeCompare(b.time); });
    renderTasks(); updateStats(); toast("인쇄 창을 여는 중… (PDF 저장 가능)");
    setTimeout(()=>window.print(),250);
  };

  // ══════════════════════════════════════
  // 일정 미루기 (Reschedule) 기능
  // ══════════════════════════════════════
  let rsStep = 1;
  let rsFilter = "undone";
  let rsSelectedIds = new Set();
  let rsTargetDate = "";
  let rsSourceKey = "";

  function rsFmtDate(dateStr){
    if(!dateStr) return "";
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"});
  }

  window.rsOpen = () => {
    if(!selKey){ toast("날짜를 먼저 선택하세요."); return; }
    rsSourceKey = selKey;
    rsStep = 1; rsFilter = "undone"; rsTargetDate = "";
    rsSelectedIds = new Set(tasks.filter(t=>!t.done).map(t=>t.id));
    document.getElementById("rs-source-label").textContent = rsFmtDate(rsSourceKey);
    document.getElementById("rs-fb-undone").classList.add("on");
    document.getElementById("rs-fb-all").classList.remove("on");
    document.getElementById("rs-date-input").value = "";
    document.getElementById("rs-target-preview").style.display = "none";
    rsBuildQuickDates();
    rsRenderTodos();
    rsUpdateStepUI();
    document.getElementById("rs-backdrop").classList.add("show");
    document.getElementById("rs-modal").classList.add("show");
  };

  window.rsClose = () => {
    document.getElementById("rs-backdrop").classList.remove("show");
    document.getElementById("rs-modal").classList.remove("show");
  };

  window.rsSetFilter = (mode) => {
    rsFilter = mode;
    document.getElementById("rs-fb-undone").classList.toggle("on", mode==="undone");
    document.getElementById("rs-fb-all").classList.toggle("on", mode==="all");
    rsRenderTodos(); rsUpdateNextBtn();
  };

  function rsFiltered(){
    return rsFilter==="undone" ? tasks.filter(t=>!t.done) : tasks;
  }

  window.rsSelectAll = () => { rsFiltered().forEach(t=>rsSelectedIds.add(t.id)); rsRenderTodos(); rsUpdateNextBtn(); };
  window.rsDeselectAll = () => { rsFiltered().forEach(t=>rsSelectedIds.delete(t.id)); rsRenderTodos(); rsUpdateNextBtn(); };

  function rsRenderTodos(){
    const list = document.getElementById("rs-todo-list");
    const visible = rsFiltered();
    if(visible.length===0){
      list.innerHTML=`<div class="rs-empty">${rsFilter==="undone"?"미완료 일정이 없습니다 🎉":"일정이 없습니다"}</div>`;
    } else {
      list.innerHTML = visible.map(t=>`
        <div class="rs-todo-item${rsSelectedIds.has(t.id)?" sel":""}" onclick="rsToggleItem('${t.id}')">
          <div class="rs-cb">${rsSelectedIds.has(t.id)?"✓":""}</div>
          <div class="rs-todo-txt">
            <span class="${t.done?"rs-done-txt":""}">${t.important?"⭐ ":""}${escHtml(t.text)}</span>
            ${t.done?'<span class="rs-done-badge">완료됨</span>':""}
          </div>
        </div>`).join("");
    }
    document.getElementById("rs-sel-count").textContent = rsSelectedIds.size + "개 선택됨";
  }

  window.rsToggleItem = (id) => {
    if(rsSelectedIds.has(id)) rsSelectedIds.delete(id); else rsSelectedIds.add(id);
    rsRenderTodos(); rsUpdateNextBtn();
  };

  function rsBuildQuickDates(){
    const wrap = document.getElementById("rs-quick");
    const items = [{label:"내일",days:1},{label:"모레",days:2},{label:"3일 후",days:3},{label:"1주 후",days:7}];
    wrap.innerHTML = items.map(({label,days})=>{
      const d=new Date(); d.setDate(d.getDate()+days);
      const val=d.toISOString().split("T")[0];
      return `<button class="rs-qbtn" data-val="${val}" onclick="rsSetQuickDate('${val}')">
        ${label}<span class="rs-qbtn-sub">${d.getMonth()+1}/${d.getDate()}</span></button>`;
    }).join("");
    // 날짜 input min 설정
    const minD=new Date(); minD.setDate(minD.getDate()+1);
    document.getElementById("rs-date-input").min = minD.toISOString().split("T")[0];
  }

  window.rsSetQuickDate = (val) => {
    rsTargetDate = val;
    document.getElementById("rs-date-input").value = val;
    document.querySelectorAll(".rs-qbtn").forEach(b=>b.classList.toggle("on",b.dataset.val===val));
    rsShowTargetPreview(); rsUpdateNextBtn();
  };

  window.rsOnDateInput = (val) => {
    rsTargetDate = val;
    document.querySelectorAll(".rs-qbtn").forEach(b=>b.classList.toggle("on",b.dataset.val===val));
    rsShowTargetPreview(); rsUpdateNextBtn();
  };

  function rsShowTargetPreview(){
    const p = document.getElementById("rs-target-preview");
    if(rsTargetDate){ p.textContent="📅 "+rsFmtDate(rsTargetDate)+"으로 이동"; p.style.display="block"; }
    else p.style.display="none";
  }

  window.rsGoNext = () => {
    if(rsStep===2) rsBuildConfirm();
    rsStep++;
    rsUpdateStepUI();
  };
  window.rsGoBack = () => { rsStep--; rsUpdateStepUI(); };

  function rsUpdateStepUI(){
    [1,2,3].forEach(s=>{
      document.getElementById("rs-p"+s).classList.toggle("active",s===rsStep);
      const dot=document.getElementById("rs-dot"+s);
      const lbl=document.getElementById("rs-lbl"+s);
      dot.className="rs-step-dot"+(s<rsStep?" done":s===rsStep?" active":"");
      dot.textContent=s<rsStep?"✓":s;
      lbl.className="rs-step-label"+(s===rsStep?" active":"");
    });
    document.getElementById("rs-back").style.display=rsStep>1?"":"none";
    document.getElementById("rs-next").style.display=rsStep<3?"":"none";
    document.getElementById("rs-confirm").style.display=rsStep===3?"":"none";
    rsUpdateNextBtn();
  }

  function rsUpdateNextBtn(){
    const btn=document.getElementById("rs-next");
    if(rsStep===1) btn.disabled=rsSelectedIds.size===0;
    else if(rsStep===2) btn.disabled=!rsTargetDate;
  }

  function rsBuildConfirm(){
    document.getElementById("rs-cf-from").textContent=rsFmtDate(rsSourceKey);
    document.getElementById("rs-cf-to").textContent=rsFmtDate(rsTargetDate);
    const sel=tasks.filter(t=>rsSelectedIds.has(t.id));
    document.getElementById("rs-cf-title").textContent=`이동할 일정 (${sel.length}개)`;
    document.getElementById("rs-cf-list").innerHTML=sel.map(t=>
      `<div class="rs-cf-item"><span class="rs-cf-bullet">•</span>${t.important?"⭐ ":""}${escHtml(t.text)}</div>`
    ).join("");
  }

  window.rsHandleConfirm = async () => {
    if(!rsTargetDate||rsSelectedIds.size===0) return;

    // 이동할 일정들 추출
    const movingTasks = tasks.filter(t=>rsSelectedIds.has(t.id));

    // 1. 현재 날짜에서 제거
    tasks = tasks.filter(t=>!rsSelectedIds.has(t.id));
    const srcNotes = document.getElementById("notes-input").value;
    const srcData = {tasks, notes:srcNotes, updatedAt:Date.now()};
    saveLocalDay(rsSourceKey, srcData);
    renderTasks(); updateStats(); renderCalendar();
    if(currentUser){
      try{ await saveCloudDay(currentUser.uid, rsSourceKey, srcData); }catch(e){ console.error(e); }
    }

    // 2. 대상 날짜에 추가 (기존 데이터와 병합)
    const targetLocal = loadLocalDay(rsTargetDate);
    let targetTasks = targetLocal.tasks || [];
    // 새 id 부여해서 추가 (충돌 방지)
    const newTasks = movingTasks.map(t=>({...t, id:Date.now().toString()+Math.random().toString(36).slice(2), done:false}));
    targetTasks = [...targetTasks, ...newTasks];
    const targetData = {tasks:targetTasks, notes:targetLocal.notes||"", updatedAt:Date.now()};
    saveLocalDay(rsTargetDate, targetData);
    if(currentUser){
      try{ await saveCloudDay(currentUser.uid, rsTargetDate, targetData); }catch(e){ console.error(e); }
    }

    isDirty=false;
    rsClose();
    toast(`✓ ${movingTasks.length}개 일정이 ${rsFmtDate(rsTargetDate)}으로 이동되었어요!`);
    renderCalendar();
  };

  // ===== onAuthStateChanged =====
  onAuthStateChanged(auth, async (user) => {
    currentUser = user || null;
    refreshAuthUI();
    if(currentUser){
      try{ const ct=await loadThemeCloud(currentUser.uid); if(ct){saveThemeLocal(ct);applyTheme(ct);} }catch(e){ console.error(e); }
      if(selKey){
        try{
          const local=loadLocalDay(selKey); const cloud=await loadCloudDay(currentUser.uid,selKey);
          const merged=mergeDay(local,cloud); tasks=merged.tasks||[];
          document.getElementById("notes-input").value=merged.notes||"";
          isDirty=false; saveLocalDay(selKey,merged); renderTasks(); updateStats();
        }catch(e){ console.error(e); }
        renderCalendar();
      }
    }
  });

  // ===== init =====
  const localTheme=loadThemeLocal();
  applyTheme(localTheme||presets[0]);
  renderCalendar();
  await selectDate(today.getFullYear(),today.getMonth(),today.getDate());
</script>
</body>
</html>
